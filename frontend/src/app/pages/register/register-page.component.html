<section class="auth">
  <div class="shell">
    <div class="hero">
      <img class="hero-logo" src="assets/logo/moodylogo.png" alt="Moody" />
      <p class="eyebrow">Moody</p>
      <h1>Create your cozy space</h1>
      <p class="muted">Sign up to log moods, build habits, and keep a gentle planner.</p>
      <p class="switch">Already have an account? <a routerLink="/login">Log in</a></p>
    </div>

    <div class="card">
      <h2>Sign up</h2>
      <p class="muted">Start fresh today.</p>
      <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
        <label>Email
          <input type="email" formControlName="email" placeholder="you@example.com" />
          <span class="field-error" *ngIf="emailCtrl?.touched && emailCtrl?.invalid">
            <span *ngIf="emailCtrl?.errors?.['required']">Please add your email.</span>
            <span *ngIf="emailCtrl?.errors?.['email']">That email format doesn’t look right.</span>
          </span>
        </label>
        <label>Password
          <div class="password-field">
            <input [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="••••••••" />
            <button type="button" class="toggle" (click)="togglePassword()" aria-label="Toggle password visibility">
              {{ showPassword ? 'Hide' : 'Show' }}
            </button>
          </div>
          <span class="field-error" *ngIf="passwordCtrl?.touched && passwordCtrl?.invalid">
            <span *ngIf="passwordCtrl?.errors?.['required']">Please enter a password.</span>
            <span *ngIf="passwordCtrl?.errors?.['minlength']">Use at least 6 characters.</span>
          </span>
        </label>
        <button type="submit" [disabled]="submitting || form.invalid">
          <span *ngIf="!submitting">Create account</span>
          <span *ngIf="submitting" class="spinner" aria-hidden="true"></span>
          <span *ngIf="submitting">Creating...</span>
        </button>
      </form>
      <p class="message" *ngIf="message">{{ message }}</p>
      <p class="error" *ngIf="error">{{ error }}</p>
      <p class="switch">Have a login already? <a routerLink="/login">Sign in</a></p>
    </div>
  </div>
</section>
