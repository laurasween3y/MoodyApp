<section class="auth">
  <div class="shell">
    <div class="hero">
      <img class="hero-logo" src="assets/logo/moodylogo.png" alt="Moody" />
      <p class="eyebrow">Moody</p>
      <h1>Welcome back</h1>
      <p class="muted">Log in to track your mood, journal gently, and plan soft days.</p>
      <p class="switch">New here? <a routerLink="/register">Create an account</a></p>
    </div>

    <div class="card">
      <h2>Sign in</h2>
      <p class="muted">Use your email or username and password.</p>
      <form (ngSubmit)="submit()" novalidate>
        <label>Email
          <input type="email" [(ngModel)]="email" name="email" required placeholder="you@example.com" />
        </label>
        <label>Password
          <input type="password" [(ngModel)]="password" name="password" required minlength="6" placeholder="••••••••" />
        </label>
        <button type="submit">Log in</button>
      </form>
      <p class="error" *ngIf="error">{{ error }}</p>
      <p class="switch">Need an account? <a routerLink="/register">Sign up</a></p>
    </div>
  </div>
</section>
