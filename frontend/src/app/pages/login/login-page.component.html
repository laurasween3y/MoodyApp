<section class="auth">
  <div class="card">
    <h1>Login</h1>
    <form (ngSubmit)="submit()" novalidate>
      <label>Email
        <input type="email" [(ngModel)]="email" name="email" required />
      </label>
      <label>Password
        <input type="password" [(ngModel)]="password" name="password" required />
      </label>
      <button type="submit">Sign in</button>
    </form>
  </div>
</section>
