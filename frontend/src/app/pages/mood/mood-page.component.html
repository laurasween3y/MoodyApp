<main class="page">
  <section class="card">
    <h1>Mood tracker</h1>
    <p class="muted">Uses the generated Angular client to call the Flask API.</p>

    <div class="mood-grid" role="list">
      <button
        *ngFor="let mood of moods"
        type="button"
        role="listitem"
        (click)="selectedMood = mood.key"
        [class.selected]="selectedMood === mood.key"
        [disabled]="loading"
      >
        <img [src]="mood.icon" [alt]="mood.label" />
        <span>{{ mood.label }}</span>
      </button>
    </div>

    <label class="note">
      Optional note
      <textarea name="note" [(ngModel)]="note" placeholder="Add a short note..."></textarea>
    </label>

    <div class="actions">
      <button type="button" (click)="saveMood()" [disabled]="loading || !selectedMood">
        {{ loading ? 'Saving…' : 'Save mood' }}
      </button>
      <button type="button" (click)="refreshData()" [disabled]="loading">
        Refresh data
      </button>
    </div>

    <div *ngIf="error" class="alert">{{ error }}</div>

    <div class="panel" *ngIf="today">
      <h2>Today</h2>
      <div class="today-mood">
        <img *ngIf="moodIcon(today.mood)" [src]="moodIcon(today.mood)" [alt]="today.mood" />
        <div>
          <p><strong>Mood:</strong> {{ today.mood }}</p>
          <p><strong>Note:</strong> {{ today.note || '—' }}</p>
          <p><strong>Date:</strong> {{ today.date }}</p>
        </div>
      </div>
    </div>

    <div *ngIf="!today && !error" class="muted">No mood for today yet.</div>

    <div class="panel">
      <h2>All moods</h2>
      <div *ngIf="allMoods.length === 0" class="muted">No moods saved yet.</div>
      <div class="calendar-grid" *ngIf="allMoods.length > 0">
        <article class="day" *ngFor="let mood of allMoods">
          <header>
            <span class="date">{{ mood.date }}</span>
            <span class="label">{{ mood.mood }}</span>
          </header>
          <img *ngIf="moodIcon(mood.mood)" [src]="moodIcon(mood.mood)" [alt]="mood.mood" />
          <p class="note">{{ mood.note || '—' }}</p>
        </article>
      </div>
    </div>
  </section>
</main>
