<section class="page">
  <div class="card">
    <div class="section-head">
      <div>
        <p class="eyebrow">{{ isCreate ? 'New entry' : 'Edit entry' }}</p>
        <h1>{{ isCreate ? 'Create entry' : 'Edit entry' }}</h1>
      </div>
      <button class="ghost" type="button" (click)="goBack()">Back to journal</button>
    </div>

    <form (ngSubmit)="saveEntry()" class="entry-form">
      <div class="meta">
        <label class="field">
          <span>Title (optional)</span>
          <input type="text" [(ngModel)]="entryTitle" name="entryTitle" placeholder="My thoughts" />
        </label>

        <label class="field">
          <span>Date</span>
          <input type="date" [(ngModel)]="entryDate" name="entryDate" />
        </label>
      </div>

      <div class="toolbar">
        <div class="group">
          <button type="button" (click)="toggleBold()" [class.active]="editorReady && editor?.isActive('bold')">B</button>
          <button type="button" (click)="toggleItalic()" [class.active]="editorReady && editor?.isActive('italic')">I</button>
          <button type="button" (click)="toggleUnderline()" [class.active]="editorReady && editor?.isActive('underline')">U</button>
        </div>
        <div class="group">
          <label class="inline">Heading
            <select [(ngModel)]="currentHeading" name="heading" [ngModelOptions]="{standalone: true}" (ngModelChange)="setHeading($event)">
              <option *ngFor="let h of headings" [ngValue]="h.level">{{ h.label }}</option>
            </select>
          </label>
        </div>
        <div class="group">
          <button type="button" (click)="toggleBullet()" [class.active]="editorReady && editor?.isActive('bulletList')">• List</button>
          <button type="button" (click)="toggleOrdered()" [class.active]="editorReady && editor?.isActive('orderedList')">1. List</button>
        </div>
        <div class="group">
          <label class="inline">Font
            <select [(ngModel)]="fontFamily" name="fontFamily" [ngModelOptions]="{standalone: true}" (ngModelChange)="setFontFamily($event)">
              <option *ngFor="let f of fontFamilies" [value]="f">{{ f }}</option>
            </select>
          </label>
          <label class="inline">Size
            <select [(ngModel)]="fontSize" name="fontSize" [ngModelOptions]="{standalone: true}" (ngModelChange)="setFontSize($event)">
              <option *ngFor="let s of fontSizes" [value]="s">{{ s }} px</option>
            </select>
          </label>
        </div>
        <div class="group">
          <label class="inline">Text color
            <input type="color" [(ngModel)]="textColor" name="textColor" [ngModelOptions]="{standalone: true}" (ngModelChange)="setColor($event)" />
          </label>
          <label class="inline">Highlight
            <input type="color" [(ngModel)]="highlightColor" name="highlightColor" [ngModelOptions]="{standalone: true}" (ngModelChange)="setHighlight($event)" />
          </label>
        </div>
        <div class="group">
          <input #imageInput type="file" accept="image/*" (change)="insertImage($event)" hidden />
          <button type="button" (click)="imageInput.click()">Image</button>
          <button type="button" (click)="toggleDrawing()">Drawing</button>
        </div>
        <div class="group">
          <button type="button" (click)="undo()">Undo</button>
          <button type="button" (click)="redo()">Redo</button>
        </div>
      </div>

      <label class="inline">Paper style
        <select [(ngModel)]="selectedBackground" name="background" [ngModelOptions]="{standalone: true}" (ngModelChange)="onBackgroundChange($event)">
          <option *ngFor="let bg of backgrounds" [value]="bg.value">{{ bg.label }}</option>
        </select>
      </label>

      <div class="editor-shell" [ngClass]="selectedBackground">
        <div #editorHost class="editor-host"></div>
      </div>

      <div class="drawing-panel" *ngIf="showDrawing">
        <div class="drawing-head">
          <span>Sketch pad</span>
          <div class="drawing-actions">
            <button type="button" class="ghost" (click)="clearDrawing()">Clear</button>
            <button type="button" class="ghost" (click)="showDrawing = false">Close</button>
            <button type="button" (click)="saveDrawingToEditor()">Insert drawing</button>
          </div>
        </div>
        <div class="drawing-surface">
          <canvas
            #drawingCanvas
            (pointerdown)="startDraw($event)"
            (pointermove)="draw($event)"
            (pointerup)="endDraw($event)"
            (pointerleave)="endDraw($event)"
          ></canvas>
        </div>
        <p class="muted">Tip: use mouse or touch to draw. Insert will add it as an image.</p>
      </div>

      <div class="actions">
        <button type="submit" [disabled]="loading">{{ isCreate ? 'Create entry' : 'Save changes' }}</button>
        <button type="button" class="ghost" (click)="goBack()">Cancel</button>
        <button
          *ngIf="!isCreate"
          type="button"
          class="icon-action icon-action--delete"
          (click)="deleteEntry()"
          aria-label="Delete entry"
          title="Delete entry"
        >
          <lucide-icon name="trash-2" size="18" strokeWidth="1.8"></lucide-icon>
        </button>
      </div>
    </form>

    <p *ngIf="error" class="alert">{{ error }}</p>
  </div>
</section>
