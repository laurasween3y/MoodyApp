<div class="layout">
  <app-toast></app-toast>
  <header class="top-nav">
    <div class="brand">
  <img class="logo" src="assets/logo/moodylogo.png" alt="Moody logo" />
      <div class="title">Moody</div>
    </div>

    <button class="menu-toggle" aria-label="Toggle menu" (click)="toggleMenu()">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>

    <nav [class.open]="showMobileMenu" *ngIf="(loggedIn$ | async); else loggedOutNav">
      <a routerLink="/home" routerLinkActive="active">Home</a>
      <a routerLink="/mood" routerLinkActive="active">Mood</a>
      <a routerLink="/journal" routerLinkActive="active">Journal</a>
      <a routerLink="/planner" routerLinkActive="active">Planner</a>
      <a routerLink="/habits" routerLinkActive="active">Habits</a>
      <a routerLink="/profile" routerLinkActive="active">Profile</a>
      <button type="button" class="link logout" (click)="logout()">Logout</button>
    </nav>
    <ng-template #loggedOutNav>
      <nav>
        <a routerLink="/login" routerLinkActive="active">Login</a>
        <a routerLink="/register" routerLinkActive="active">Register</a>
      </nav>
    </ng-template>
  </header>

  <main class="content">
    <router-outlet />
  </main>
</div>
