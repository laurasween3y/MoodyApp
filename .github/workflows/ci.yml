name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: moody_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d moody_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL_TEST: postgresql+psycopg2://postgres:postgres@localhost:5432/moody_test
      SECRET_KEY: test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Backend lint (ruff)
        run: |
          pip install ruff
          ruff check backend --select E9,F --ignore F401
      - name: Run backend tests
        run: |
          cd backend
          pytest
      - name: Backend security audit (pip-audit)
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt

  frontend-tests:
    runs-on: ubuntu-latest
    env:
      CHROME_BIN: google-chrome
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: |
          cd frontend
          npm ci
      - name: Run frontend tests
        run: |
          cd frontend
          npm test -- --watch=false --browsers=ChromeHeadless
      - name: Frontend build (production)
        run: |
          cd frontend
          npm run build -- --configuration=production
      - name: Frontend lint (if configured)
        continue-on-error: true
        run: |
          cd frontend
          if node -e "const fs=require('fs');const a=JSON.parse(fs.readFileSync('angular.json','utf8'));const p=a.projects&&a.projects.frontend;const has=p&&p.architect&&p.architect.lint;process.exit(has?0:1)" ; then\n            npx ng lint\n          else\n            echo \"Lint target not configured; skipping.\"\n          fi
      - name: Frontend security audit (npm audit)
        continue-on-error: true
        run: |
          cd frontend
          npm audit --audit-level=high

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      id-token: write   # for OIDC
      contents: read
    env:
      S3_BUCKET: ${{ secrets.S3_BUCKET || vars.S3_BUCKET }}
      AWS_REGION: ${{ secrets.AWS_REGION || vars.AWS_REGION }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: |
          cd frontend
          npm ci

      - name: Build frontend (production)
        run: |
          cd frontend
          npm run build -- --configuration=production

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME || vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync build to S3
        run: |
          if [ -z "$S3_BUCKET" ]; then
            echo "S3_BUCKET is not set (define in repo secrets or variables)"; exit 1;
          fi
          aws s3 sync frontend/dist/frontend s3://$S3_BUCKET --delete --cache-control "max-age=300"
          aws s3 cp frontend/dist/frontend/index.html s3://$S3_BUCKET/index.html --cache-control "no-cache"
